<div class="animated fadeIn">
	<div class="row">
        <div class="col-sm-12">
            <div class="card">
                
            </div>
        </div>
    </div>
    <div class="row">
		<div class="col-sm-3">
		</div>
		<div class="col-sm-6">
			<table class="table table-bordered table-sm-new bgwhite">
				<tbody style='height:30px'>
				<tr>
					<td class="col-form-span-heading" colspan="4"  >
						FINANCIAL YEAR SEARCH
					</td>
				</tr>
                    <tr class="bgwhite">
                        <td > 
                            <span class="col-form-span-label"><b>Start Date</b> </span>
                            <span class="col-form-span-error">*</span>
                        </td>         
                        <td >   
                            <my-date-picker name="StartDate" [options]="myDatePickerOptions" [(ngModel)]="StartDate"></my-date-picker>
                        </td>  
                        <td > 
                            <span class="col-form-span-label"><b>End Date</b> </span>
                            <span class="col-form-span-error">*</span>
                        </td>         
                        <td>   
                            <my-date-picker name="EndDate" [options]="myDatePickerOptions" [(ngModel)]="EndDate"></my-date-picker>
                        </td>  
                    </tr>
					
					<tr>
						<td colspan="4" class="centerlabel" >
							<button class="btn btn-sm btn-success" type="submit"   (click)="searchlist()"><span class="col-form-span-label"><i class="fa fa-search"></i> Search</span></button>
						</td>
					</tr>
					<tr>
						<td colspan="4"  *ngIf="branchlist.length>0">
							<div  class="row yscroll" style="max-height:300px">
								<table class="table table-hover">
									<thead>
										<tr class="col-form-span-heading" style="white-space:nowrap;">
											<th class="col-form-span-label">COMPANY NAME</th>
										                                          
										</tr>
									 </thead>
									<tbody class="bgwhite">
										<tr *ngFor="let obj of branchlist">
											<td><span class="col-form-span-label">{{obj.CMP_NAME}}</span></td>
											<!--td><span  >{{obj.CMP_NAME}}</span></td-->
											<!--td><span class="col-form-span-label anchor-link" (click)="ListOnclick(obj.PK_YEARID)" style="cursor:pointer;">{{obj.CMP_NAME}}</span></td-->
										</tr>
									</tbody>
								</table>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
			 
		</div>
	</div>
	<div class="col-sm-3">
	</div>
