                                placeholder="--Please Select Airline Line--">
                            </ng-select>
                        </td>

                    <tr>
  <td colspan="4">
    <div class="container-fluid py-0">

      <!-- 🔹 Header Row -->
      <div class="row fw-semibold  border-bottom pb-1 align-items-center">
        <!-- <div class="col-md-3 text-dark fw-semibold" style="font-size: 1rem;">Chrg Type</div> -->
         <div class="col-md-3" >
            <label class="form-label">Charge Type</label>
        </div> 
          <div class="col-md-5" >
            <label class="form-label">Account</label>
        </div> 
         <div class="col-md-2" >
            <label class="form-label">Currency</label>
        </div> 
         <div class="col-md-2" >
            <label class="form-label">&nbsp;</label>
        </div> 
        <!-- <div class="col-md-5 text-dark fw-semibold" style="font-size: 1rem;">Account / Charge Name</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Currency</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">&nbsp;</div> -->
      </div>

      <!-- 🔹 First Row Inputs -->
      <div class="row g-2 mt-2 align-items-center">
        <div class="col-md-3">
          <ng-select [items]="chngetypetable"
            bindLabel="DATATEXTVALUE"
            bindValue="DATAVALUE"
            [(ngModel)]="chargetype"
            class="custom rounded-pill w-100"
            placeholder="--Select--">
          </ng-select>
        </div>
        <div class="col-md-5">
          <ng-select [items]="accountable"
            bindLabel="DATATEXTVALUE"
            bindValue="DATAVALUE"
            [(ngModel)]="acccode"
            class="custom rounded-pill w-100"
            placeholder="--Select Account / Charge--">
          </ng-select>
        </div>
        <div class="col-md-3">
          <ng-select [items]="currencytable"
            bindLabel="DATATEXTVALUE"
            bindValue="DATAVALUE"
            [(ngModel)]="currency"
            (ngModelChange)="getexchangerate($event)"
            class="custom rounded-pill w-100"
            placeholder="--Currency--">
          </ng-select>
        </div>
        <div class="col-md-1"></div>
      </div>

      <!-- 🔹 Second Header Row -->
      <div class="row fw-semibold  border-bottom mt-3 pb-1 align-items-center">
        <div class="col-md-2" > 
            <label class="form-label">Rate</label>
        </div> 
         <div class="col-md-2" > 
            <label class="form-label">Ex. Rate</label>
        </div> 
         <div class="col-md-2" > 
            <label class="form-label">Min Rate</label>
        </div> 
         <div class="col-md-2" > 
            <label class="form-label">Unit</label>
        </div> 
         <div class="col-md-2" > 
            <label class="form-label">Unit Type</label>
        </div> 
         <div class="col-md-2" > 
            <label class="form-label">Actions</label>
        </div>
        <!-- <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Rate</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Ex. Rate</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Min Rate</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Unit</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Unit Type</div>
        <div class="col-md-2 text-dark fw-semibold" style="font-size: 1rem;">Actions</div> -->
      </div>

      <!-- 🔹 Second Row Inputs + Buttons -->
      <div class="row g-2 mt-2 align-items-center">
         <div class="col-md-2">
          <input [(ngModel)]="rate" OnlyNumber="true" type="text"
            class="form-control text-end" placeholder="Rate" />
        </div>
        <div class="col-md-2">
          <input [(ngModel)]="exrate" OnlyNumber="true" type="text" [disabled]="disableexrate"
            class="form-control text-end" placeholder="Ex. Rate" />
        </div>
       
        <div class="col-md-2">
          <input [(ngModel)]="minrate" OnlyNumber="true" type="text"
            class="form-control text-end" placeholder="Min Rate" />
        </div>
         <div class="col-md-2">
          <input [(ngModel)]="unit" OnlyNumber="true" type="text"
            class="form-control text-end" placeholder="Unit" />
        </div>
        <div class="col-md-2">
          <ng-select [items]="unittabel"
            bindLabel="DATATEXTVALUE"
            bindValue="DATAVALUE"
            [(ngModel)]="unittype"
            class="custom rounded-pill w-100"
            placeholder="--Unit--">
          </ng-select>
        </div>

        <div class="col-md-2 d-flex justify-content-start">
          <button class="btn btn-success btn-sm rounded-pill px-3 me-2" (click)="Addchilddata()">
            <i class="fa fa-plus me-1"></i> {{childbtntext}}
          </button>
          <button class="btn btn-warning btn-sm rounded-pill px-3" (click)="Resetchildrecd()">
            <i class="fa fa-undo me-1"></i> Reset
          </button>
        </div>
      </div>

    </div>
  </td>
</tr>
