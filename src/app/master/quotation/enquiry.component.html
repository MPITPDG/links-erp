                <div class="row " >

                            <button class="btn btn-outline-danger btn-sm rounded-pill px-4 shadow fw-semibold" type="reset" (click)="ResetMainEnquiry();">

                <div class="row" style="height: 220px; overflow-y: auto; margin-top: 10px;">
                            <table class="table table-sm  align-middle mb-0 w-100 shadow-sm charges-table rounded-4 overflow-hidden ">
                            <thead class="col-form-span-heading py-1 bg-body-secondary text-start fw-semibold text-primary heading-box  sticky-header">
                                <tr class="text-primary bg-body-secondary text-center reduced-height-row ">
                                <th style="width: 35px;"></th>
                                <th class="form-label"style="width: 100px;">Enq No</th>
                                <th style="width: 90px;" >Enq Date</th>
                                <th style="width: 90px;">Enq Type</th>

                                <th style="width: 100px;" class="text-end">Branch</th>
                                
                                </tr>
                            </thead>
