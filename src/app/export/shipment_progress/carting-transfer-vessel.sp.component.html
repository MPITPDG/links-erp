
<div class="animated fadeIn">
		<div class="row">
			<div class="col-sm-12">
				<div class="card">
					<div class="card-header formheading">
					   <strong><u>{{headerType}}</u></strong>
					</div>
				</div>
			</div>
		</div>
<div class="row">	
	<div class="col-sm-3">
	</div>
	<div class="col-sm-6">	 
		<table class="table table-bordered table-sm-new">			
			
			<tr>
				<td>
					<span class="col-form-span-label ">Vessel Name</span>
				</td>
				<td  >
					<select class="form-control width300"  [(ngModel)]="VslName" (change)="onAgentSelect($event.target.value)">
						<option value="">Please select</option>
						<option *ngFor="let d of vslnameList" value={{d.RTNOPRT}}>{{d.VSL_NAME}}</option>
					</select>
				</td>
			</tr>
			<tr>
				<td>
					<span class="col-form-span-label ">Vessel Agent</span>
				</td>
				<td  >
					<select class="form-control width200"  [(ngModel)]="VslAgent"  >
						<option value="">Please select</option>
						<option *ngFor="let d of Agentlist" value={{d.agt_code}}>{{d.agt_name}}</option>
					</select>
				</td>
			</tr>
			<tr>
				<td>
					<span class="col-form-span-label ">Exptno</span>
				</td>
				<td  >
					 <input type="Textbox" class="form-control width150" [(ngModel)]="Exptno" maxlength="15"    >
				</td>
			</tr>
			<tr>				
				<td colspan="2" class="centerlabel" >
					<button class="btn btn-sm btn-success" type="submit"  name="btnAgtAdd"  (click)="onTransfervsl()"> <span class="col-form-span-label "><i class="fa fa-search"></i> Transfer </span></button>
				</td>
				
			</tr>
		</table>
	</div>
		<div class="col-sm-3">            
		</div>
	</div>	
</div>
