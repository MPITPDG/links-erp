<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden !important; /* HIDE OUTER SCROLLBAR */
  }

  .auto-job-wrapper {
    display: flex;
    flex-direction: column;
    height: 80vh;
    overflow: hidden; /* Prevent scroll on wrapper */
  }

  .fixed-header {
    background-color: #26a6d4;
    color: white;
    padding: 10px 16px;
    font-weight: bold;
    font-size: 1rem;
    flex-shrink: 0;
    padding: 0 12px;
     height: 22px; 

    }
/* .fixed-header {
  height: 36px; /*
  line-height: 36px;
  padding: 0 12px;
  font-size: 0.95rem;
} */
  .scrollable-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
    box-sizing: border-box;
  }

  .form-label {
    font-size: 0.875rem;
    font-weight: 600;
  }

  .form-control,
  ng-select {
    font-size: 0.875rem;
    height: 30px;
    padding: 0.25rem 0.5rem;
    width: 100%;
    box-sizing: border-box;
  }

  .form-check-label,
  .form-check-input {
    font-size: 0.8rem;
  }

  .card-body {
    padding: 0.75rem 1rem;
  }

  .table thead th {
    background-color: #26a6d4;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .table-responsive {
    max-height: 180px;
    overflow-y: auto;
  }

  .row {
    margin-left: 0;
    margin-right: 0;
  }

  /* Optional: Hide scrollbar width but keep scrolling working */
  body::-webkit-scrollbar,
  html::-webkit-scrollbar {
    display: none;
  }
</style>

<div class="auto-job-wrapper">
  <div class="fixed-header">
    AUTO JOB
</div>

  <div class="scrollable-body">
    <div class="container-fluid px-2">
      <!-- FORM SECTION -->
      <div class="row justify-content-center mt-2">
        <div class="col-lg-12">
          <div class="card shadow-sm">
            <div class="card-body small">
                <form>
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label d-block">Mode <span class="text-danger">*</span></label>
                <div class="form-check form-check-inline">
                  <!-- <input class="form-check-input" type="radio" name="rbexporter" id="mode1" value="1" (click)="fill(1)">
                  <label class="form-check-label" for="mode1">Exporter</label> -->
                   <span class="col-form-span-label">
                                        <input type="radio" name="rbexporter" [checked]="rbexporter === 1" value="1"
                                            (click)="fill(1)" /> Exporter/Shipper
                                        <input type="hidden" name="shipper" [(ngModel)]="hdshipper" />
                                    </span>
                </div>
                <div class="form-check form-check-inline">
                  <!-- <input class="form-check-input" type="radio" name="rbexporter" id="mode2" value="2" (click)="fill(2)">
                  <label class="form-check-label" for="mode2">Bill To</label> -->
                    <span class="col-form-span-label">
                                        <input type="radio" name="rbexporter" [checked]="rbexporter === 2" value="2"
                                            (click)="fill(2)" /> Bill To
                                        <input type="hidden" name="expt_billto" [(ngModel)]="hdexpt_billto" />
                                    </span>
                </div>
                <div class="form-check form-check-inline">
                  <!-- <input class="form-check-input" type="radio" name="rbexporter" id="mode3" value="3" (click)="fill(3)">
                  <label class="form-check-label" for="mode3">Manufacturer</label> -->
                   <span class="col-form-span-label">
                                        <input type="radio" name="rbexporter" [checked]="rbexporter === 3" value="3"
                                            (click)="fill(3)" /> Manufacture
                                        <input type="hidden" name="manufacturer" [(ngModel)]="hdmanufacturer" />
                                    </span>
                </div>
              </div>

              <div class="col-md-6" >
                <label class="form-label">Exporter/Shipper</label>
                <ng-select name="drpShipper" [items]="exporters" bindLabel="TEXTFIELD" bindValue="VALUEFIELD" [(ngModel)]="drpShipper" (change)="drpfill(drpShipper)" class="custom width175"></ng-select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Exporter/Shipper</label>
                <input type="text" class="form-control" [(ngModel)]="txtshipper" name="txtshipper" disabled>
              </div>

              <div class="col-md-4">
                <label class="form-label">Bill To</label>
                <input type="text" class="form-control" [(ngModel)]="txtexpt_billto" name="txtexpt_billto" disabled>
              </div>

              <div class="col-md-4">
                <label class="form-label">Manufacturer</label>
                <input type="text" class="form-control" [(ngModel)]="txtmanufacturer" name="txtmanufacturer" disabled>
              </div>

              <div class="col-md-4">
                <label class="form-label">Agent</label>
                <ng-select name="drpAgent" [items]="agents" bindLabel="TEXTFIELD" bindValue="VALUEFIELD" [(ngModel)]="drpAgent" class="custom"></ng-select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Sub Agent</label>
                <ng-select name="drpSubAgent" [items]="subagents" bindLabel="TEXTFIELD" bindValue="VALUEFIELD" [(ngModel)]="drpSubAgent" class="custom"></ng-select>
              </div>
                <div class="col-md-4">
                <label class="form-label">If Consigned to Bank</label>
                <ng-select name="drpBank" [items]="banks" bindLabel="TEXTFIELD" bindValue="VALUEFIELD" [(ngModel)]="drpBank" class="custom"></ng-select>
              </div>

              <div class="col-md-12">
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="checkbox" id="chknotify" [(ngModel)]="chknotify" name="chknotify">
                  <label class="form-check-label" for="chknotify">Notify whether consignee & buyer are the same</label>
                </div>
                <div class="form-check form-check-inline ms-2">
                  <input class="form-check-input" type="radio" name="rbconsig" id="cons1" value="cons" [checked]="rbCons === 1" (click)="fill1(1)">
                  <label class="form-check-label" for="cons1">Consignee</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="rbconsig" id="cons2" value="buy" [checked]="rbCons === 2" [disabled]="rbConsDisabled == 2" (click)="fill1(2)">
                  <label class="form-check-label" for="cons2">Buyer</label>
                </div>
              </div>
               
  <div class="col-md-4">
    <label class="form-label">Consignee</label>
    <ng-select name="drpexpt_consignee" [items]="consignees" bindLabel="TEXTFIELD" bindValue="VALUEFIELD"
      [(ngModel)]="drpexpt_consignee" class="custom width150" (change)="consfill(drpexpt_consignee)">
    </ng-select>
  </div>

  <div class="col-md-4">
    <label class="form-label">Consignee Name</label>
    <input type="text" class="form-control" [(ngModel)]="txtConsignee" name="txtConsignee" disabled>
  </div>

  <div class="col-md-4">
    <label class="form-label">Buyer</label>
    <input type="text" class="form-control" [(ngModel)]="txtBuyername" name="txtBuyername" disabled>
  </div>

                <!-- <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="rbconsig" id="cons2" value="buy" [checked]="rbCons === 2" [disabled]="rbConsDisabled == 2" (click)="fill1(2)">
                  <label class="form-check-label" for="cons2">Buyer</label>
                </div>
              </div>

              <div class="col-md-4">
                <label class="form-label">Consignee</label>
                <ng-select name="drpexpt_consignee" [items]="consignees" bindLabel="TEXTFIELD" bindValue="VALUEFIELD" [(ngModel)]="drpexpt_consignee" class="form-control" (change)="consfill(drpexpt_consignee)"></ng-select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Consignee Name</label>
                <input type="text" class="form-control" [(ngModel)]="txtConsignee" name="txtConsignee" disabled>
              </div>

              <div class="col-md-4">
                <label class="form-label">Buyer</label>
                <input type="text" class="form-control" [(ngModel)]="txtBuyername" name="txtBuyername" disabled>
              </div> -->

            
<!-- MODE OF SHIPMENT -->
<div class="row mb-2">
  <div class="col-sm-7">
    <label class="form-label">Mode of Shipment</label>
    <div class="d-flex flex-wrap ">
      <div class="form-check form-check-inline">
        <!-- <input class="form-check-input" type="radio" name="stuff" [checked]="rbstuff === 1" value="shipmentMode" [(ngModel)]="rbstuff" (click)="vsl(1, 'SEA')">
        <label class="form-check-label">Factory Stuffing</label> -->
          <span class="col-form-span-label" for="inline-radio1">
                                        <input type="radio" name="stuff" [checked]="rbstuff === 1" value="shipmentMode"
                                            (click)="vsl(1, 'SEA')">Factory Stuffing
                                    </span>
      </div>
      <div class="form-check form-check-inline">
        <span class="col-form-span-label" for="inline-radio2">
                                        <input type="radio" name="stuff" [checked]="rbstuff === 2" value="shipmentMode"
                                            (click)="vsl(2, 'SEA')">Docks/Godown Stuffing
                                    </span>
        <!-- <input class="form-check-input" type="radio" name="stuff" [checked]="rbstuff === 2" value="shipmentMode" [(ngModel)]="rbstuff" (click)="vsl(2, 'SEA')">
        <label class="form-check-label">Docks/Godown Stuffing</label> -->
      </div>
      <div class="form-check form-check-inline">
        <!-- <input class="form-check-input" type="radio" name="stuff" [checked]="rbstuff === 3" value="shipmentMode" [(ngModel)]="rbstuff" (click)="vsl(3, 'AIR')">
        <label class="form-check-label">Air Shipment</label> -->
          <span class="col-form-span-label" for="inline-radio3">
                                        <input type="radio" name="stuff" [checked]="rbstuff === 3" value="shipmentMode"
                                            (click)="vsl(3, 'AIR')"> Air Shipment
                                    </span>
      </div>
    </div>
  </div>
   <div class="col-sm-5" *ngIf="rbstuff === 3">
    <label class="form-label">Air Shipment Type</label>
    <div class="d-flex flex-wrap gap-3">
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="SubAir" value="0" [(ngModel)]="rbsubair" (click)="subAir(0)">
        <label class="form-check-label">Air</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="SubAir" value="1" [(ngModel)]="rbsubair" (click)="subAir(1)">
        <label class="form-check-label">Differed</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="SubAir" value="2" [(ngModel)]="rbsubair" (click)="subAir(2)">
        <label class="form-check-label">SEA-AIR</label>
      </div>
    </div>
  </div>
</div>

               <div class="col-md-2">
                <label class="form-label">Incoterm</label>
                 <ng-select [items]="incotermlist" bindLabel="TEXTFIELD" bindValue="VALUEFIELD" [(ngModel)]="incoterm"
                 (change)="changeIncoterm(incoterm)" class="custom width120" placeholder="--Select--">
                  </ng-select>
              </div>   
              <div class="col-md-2">
                <label class="form-label">Exporter Inv No.</label>
                <input type="text" class="form-control" [(ngModel)]="expinvno" name="expinvno">
              </div>
              <div class="col-md-2">
                <label class="form-label">Inv Date</label>
                <my-date-picker name="exptinvdt" [options]="myDatePickerOptions" [(ngModel)]="exptinvdt"></my-date-picker>
              </div>
              <div class="col-md-2">
                <label class="form-label">Doc Recd. Date</label>
                <my-date-picker name="docrecdt" [options]="myDatePickerOptions" [(ngModel)]="docrecdt"></my-date-picker>
              </div>
              <div class="col-md-4 text-end d-flex align-items-end justify-content-end">
                <button type="button" class="btn btn-primary btn-sm me-2" (click)="finalSubmit()">
                  <i class="fa fa-dot-circle-o"></i> Submit
                </button>
                <button type="reset" class="btn btn-danger btn-sm" (click)="Reset()">
                  <i class="fa fa-ban"></i> Reset
                </button>
               
              </div>
            </div>
          </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Table section -->
      <div class="row mt-3">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body p-0">
              <div class="table-responsive" style="max-height: 180px; overflow-y: auto;">
                <table class="table table-sm mb-0">
                  <thead>
                    <tr >
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;"></th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;">Expt No.</th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;">Mode</th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;">Shipper</th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;">Consignee</th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;" >Shipment Mode</th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;">Inv No</th>
                      <th class="col-form-span-label" style="background-color: #26a6d4; color: white;position: sticky; top: 0; z-index: 2;">Doc Rec Date</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let obj of exptnolist">
                      <td><i class="fa fa-pencil" (click)="Redirecttoedit(obj.EXPTNO)"></i></td>
                      <td class="col-form-span-label">{{obj.EXPTNO}}</td>
                      <td class="col-form-span-label">{{obj.MODE}}</td>
                      <td class="col-form-span-label">{{obj.SHIPPER}}</td>
                      <td class="col-form-span-label">{{obj.CONSIGNEE}}</td>
                      <td class="col-form-span-label">{{obj.MODEOFSHIPMENT}}</td>
                      <td class="col-form-span-label">{{obj.INVNO}}</td>
                      <td class="col-form-span-label">{{obj.DOCRECDATE}}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div> <!-- /container-fluid -->
  </div> <!-- /scrollable-content -->
</div> <!-- /app-wrapper -->
