  <div class="animated fadeIn">
    <div class="row">
  
      <div class="col-sm-12">
        <div class="card">
           <div class="card-header " style="  background-color: #3daee7; color: whitesmoke;  font-weight: bold;" align="center">
              <strong>  Export Dashboard</strong>
           </div>
  
           <div class="card-body">
            <div class="row">
            <div class="col-sm-1">  </div>
             <div class="col-sm-10">
              <table class="table table-responsive-sm table-hover table-outline mb-0">
              
  
                <thead class="thead-light">
                  <tr>
                    <th class="text-center " style=" background-color:#0e9892"><i class="fa fa-ship " style="color:#ec6868;"></i></th>
                    <th style="   background-color: #0e9892;  color: #e7e2db; font-weight: bold;"> Vessel Details</th>                   
                  </tr>
                </thead>
              </table>
              <div class="chart-wrapper xscroll" style="height: 550px;">
              <accordion [closeOthers]="oneAtATime" >
                <accordion-group *ngFor="let c of Searchdata" [heading]="c.vsldet" (click)="getVslJob(c.VSL_RTNO,c.PORT)"   >
                
                  <div class="row  xyscroll" style="height: 200px;">
                  <table class="table table-responsive-sm table-hover table-outline mb-0">
                      <tr >
                        <td colspan="9"  >
                          <table class="bakgrdwhite hoverTable">																
                            <thead  style=" background-color:#004980; color: #e7e2db;">	                           
                              <th class="col-form-span-label">EXPTNO</th>
                              <th class="col-form-span-label">SHIPPER</th>                          
                              <th class="col-form-span-label">INVOICE</th>                           
                              <th class="col-form-span-label">BL</th>
                              <th class="col-form-span-label">SHIP. BL/DT </th>
                              <th class="col-form-span-label">CUST. CLR.</th>
                              <th class="col-form-span-label">CONT. NO</th>
                              <th class="col-form-span-label">REMARK</th>
                            </thead>
                            <tbody>
                              <ng-container *ngFor="let obj of filtjoblist" >
                                <tr>                                
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.EXPTNO}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.EXP_SNAME}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.INVDET}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.BLDET}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.SHIPBILLNO_DT}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.EXPT_SHIPCUSTOM}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div class="clearfix">
                                      <div class="float-left">
                                        {{obj.CONTAINERNO}}
                                      </div>                             
                                    </div>
                                  </td>
                                  <td class=" width350">
                                    <div class="clearfix">
                                      <div class="float-left" >
                                    <strong>    {{obj.REMARK}}</strong>
                                  </div>                             
                                </div>
                                  </td>
                                </tr>
                              </ng-container>
                            </tbody>
                          </table>
                        </td>
                      </tr>
                      
                  </table>  
                  </div>
                         
                </accordion-group>
              </accordion>
              </div>
           
          </div>
          <div class="col-md-1"></div>
        </div>
            </div> 
     
    </div> 
    </div> 
    </div>
  </div>
