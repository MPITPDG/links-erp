<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header formheading">
                <strong>Chronology Search</strong>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-sm-3">
    </div>
    <div class="col-sm-6">
        <table class="table table-bordered table-sm-new bgwhite">
            <tr>
                <td>
                    <span class="col-form-span-label"><b>Mode:</b></span>
                </td>
                <td colspan="3">
                    <input type="radio" value="Sea" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">Sea</span>
                    <input type="radio" value="Air" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">Air</span>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label"><b>City :</b></span>
                </td>
                <td colspan="3">
                    <ng-select [items]="CityList" bindLabel="cityname" bindValue="citycode1" placeholder="--Show All--" [(ngModel)]="City" class="form-control">
                    </ng-select>
                </td>
            </tr>
            <!-- <tr>
                <td>
                    <span class="col-form-span-label"><b>Shipper :</b></span>
                </td>
                <td colspan="3">
                    <select class="form-control width180"   [(ngModel)]="Shipper" >
                        <option value="-1">Please select</option>
                        <option  *ngFor="let d of listShipper" value={{d.SHIPPER_CODE}}>{{d.SHIPPER_NAME}}</option>
                    </select>
                </td>
            </tr> -->
            <tr>
                <td>
                    <span class="col-form-span-label"><b>From Date:</b></span>
                </td>
                <td>
                    <my-date-picker name="abcd" [options]="myDatePickerOptions" [(ngModel)]="FromDate"></my-date-picker>
                </td>
                <td>
                    <span class="col-form-span-label"><b>To Date:</b></span>
                </td>
                <td>
                    <my-date-picker name="abcd" [options]="myDatePickerOptions" [(ngModel)]="ToDate"></my-date-picker>
                </td>
            </tr>
            <tr>
                <td colspan="4" class="centerlabel">
                    <button class="btn btn-sm btn-success" type="button" (click)="onSearch()">
                        <span class="col-form-span-label">
                            <i class="fa fa-search"></i>&nbsp; Search
                        </span>
                    </button>
                </td>

            </tr>
        </table>
    </div>
    <div class="col-sm-3">
    </div>
</div>
