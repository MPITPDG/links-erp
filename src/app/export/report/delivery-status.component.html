<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header formheading">
                <strong>Delivery Status </strong>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-sm-3">
    </div>
    <div class="col-sm-6">
        <table class="table table-bordered table-sm-new bgwhite">
            <tr>
                <td>
                    <span class="col-form-span-label">MODE:</span>
                </td>
                <td colspan="3">
                    <input type="radio" value="0.CONSIGNEE LINER CONTRACT" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">CONSIGNEE LINER CONTRACT</span>
                    <br/>
                    <input type="radio" value="1.OUR LINER CONTRACT" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">OUR LINER CONTRACT</span>
                    <br/>
                    <input type="radio" value="2.BOTH (All Contract)" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">BOTH (All Contract)</span>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label">City :</span>
                </td>
                <td colspan="3">
                    <ng-select [items]="CityList" bindLabel="cityname" bindValue="citycode" placeholder="--Select City--" [(ngModel)]="City" class="form-control">
                    </ng-select>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label">Consignee :</span>
                </td>
                <td colspan="3">
                    <ng-select [items]="ConsigneeList" bindLabel="con_name" bindValue="con_code" placeholder="--Show All--" [(ngModel)]="Consignee"
                        class="form-control">
                    </ng-select>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label">From Date:</span>
                </td>
                <td>
                    <my-date-picker name="abcd" [options]="myDatePickerOptions" [(ngModel)]="FromDate"></my-date-picker>
                </td>
                <td>
                    <span class="col-form-span-label">To Date:</span>
                </td>
                <td>
                    <my-date-picker name="abcd" [options]="myDatePickerOptions" [(ngModel)]="ToDate"></my-date-picker>
                </td>
            </tr>
            <tr>
                <td colspan="4" class="col-form-span-heading centerlabel">
                    <button class="btn btn-sm btn-success" type="button" (click)="onSearch()">
                        <span class="col-form-span-label">
                            <i class="fa fa-search"></i>&nbsp; Search
                        </span>
                    </button>
                </td>

            </tr>
        </table>
    </div>
    <div class="col-sm-3">
    </div>
</div>
