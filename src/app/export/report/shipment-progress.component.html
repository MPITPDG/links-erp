<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header formheading">
                <strong>Shipment Progress Search</strong>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-sm-3">
    </div>
    <div class="col-sm-6">
        <table class="table table-bordered table-sm-new bgwhite">
            <tr>
                <td>
                    <span class="col-form-span-label"><b>MODE:</b></span>
                </td>
                <td colspan="3">
                    <input type="radio" value="Sea" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">Sea</span>
                    <input type="radio" value="Air" name="rbReportType" [(ngModel)]="ReportType" />
                    <span class="col-form-span-label">Air</span>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label"><b>City :</b></span>
                </td>
                <td colspan="3">
                    <ng-select [items]="CityList" bindLabel="cityname" bindValue="citycode1" placeholder="--Select City--" [(ngModel)]="City"
                        class="form-control">
                    </ng-select>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label"><b>From Date:</b></span>
                </td>
                <td>
                    <my-date-picker name="abcd" [options]="myDatePickerOptions" [(ngModel)]="FromDate"></my-date-picker>
                </td>
                <td>
                    <span class="col-form-span-label"><b></b>To Date:</span>
                </td>
                <td>
                    <my-date-picker name="abcd" [options]="myDatePickerOptions" [(ngModel)]="ToDate"></my-date-picker>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label"><b>Entered Date</b></span>
                </td>
                <td colspan="3">
                    <input type="radio" value="actual" name="rbDateType" [(ngModel)]="DateType" />
                    <span class="col-form-span-label">Actual</span>
                    <input type="radio" value="system" name="rbDateType" [(ngModel)]="DateType" />
                    <span class="col-form-span-label">System</span>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="col-form-span-label"><b>Display Type</b></span>
                </td>
                <td colspan="3">
                    <table class="table table-sm-new bgwhite">
                        <tr>
                            <td>
                                <input type="radio" value="0" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">DocRecd On</span>
                            </td>
                            <td>
                                <input type="radio" value="1" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">Approval Received On</span>
                            </td>
                            <td>
                                <input type="radio" value="2" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">Shipping Bill Dt</span>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="radio" value="3" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">Custom Cleared On</span>
                            </td>
                            <td>
                                <input type="radio" value="4" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">CargoRecd On</span>
                            </td>
                            <td>
                                <input type="radio" value="5" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">EpCopy Received On</span>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="radio" value="6" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">Carting Date</span>
                            </td>
                            <td>
                                <input type="radio" value="7" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">EpCopy Sent On</span>
                            </td>
                            <td>
                                <input type="radio" value="8" name="rbDisplayType" [(ngModel)]="DisplayType" />
                                <span class="col-form-span-label">Out of Charge Date </span>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td colspan="4" class="col-form-span-heading centerlabel">
                    <button class="btn btn-sm btn-success" type="button" (click)="onSearch()">
                        <span class="col-form-span-label">
                            <i class="fa fa-search"></i>&nbsp; Search
                        </span>
                    </button>
                </td>

            </tr>
        </table>
    </div>
    <div class="col-sm-3">
    </div>
</div>
