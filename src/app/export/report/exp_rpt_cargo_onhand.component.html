<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-6">
                        <table class="table table-bordered table-sm-new">
                            <tbody style='height:30px'>
                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Mode of Shipment</span>
                                    </td>
                                    <td>

                                        <span class="col-form-span-label">

                                            <input type="radio" name="radiogroup1" value="1" [(ngModel)]="checkmode">&nbsp; Sea
                                        </span>

                                    </td>
                                    <td>
                                        <span class="col-form-span-label">
                                            <input type="radio" name="radiogroup1" value="2" [(ngModel)]="checkmode" />&nbsp; Air
                                        </span>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="col-form-span-label centerlabel ">
                                        Consignee
                                    </td>
                                    <td colspan="2">
                                        <select class="form-control width250" [(ngModel)]="concode" [disabled]="condisable">
                                            <option value="-1">Please select</option>
                                            <option *ngFor="let d of listconcode" value={{d.CON_CODE}}>{{d.CON_NAME}}</option>
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="3" class="centerlabel">
                                        <button class="btn btn-sm btn-success" type="button" (click)="onexcelGeneration()">
                                            <span class="col-form-span-label">
                                                <i class="fa fa-download"></i>&nbsp; Export To Excel
                                            </span>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
                <div class="col-md-3"></div>
            </div>
        </div>
    </div>
</div>
