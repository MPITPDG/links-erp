<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-6">
                        <table class="table table-bordered table-sm-new">
                            <tbody style='height:30px'>
                                <tr>
                                    <td class="col-form-span-heading  centerlabel " colspan="3">
                                        EP-Copy-Coversheet
                                    </td>
                                </tr>
                                <tr>
                                    <td class="col-form-span-heading" colspan="3">
                                        Report Type
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Search By</span>
                                    </td>
                                    <td>

                                        <span class="col-form-span-label">
                                            <!-- <input type="radio" name="check"  (click)="mainCheck('1')" [checked]="checkWise == '1'"/>Number Wise -->
                                            <input type="radio" name="radiogroup" (click)="mainCheck('1')" [checked]="checkWise == '1'">&nbsp; Sea
                                        </span>

                                    </td>
                                    <td>
                                        <span class="col-form-span-label">
                                            <input type="radio" name="radiogroup" (click)="mainCheck('2')" [checked]="checkWise == '2'" />&nbsp; Air
                                        </span>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="col-form-span-heading" colspan="3">
                                        <input type="radio" name="radiogroupS" (click)="mainchkSearch('1')" [checked]="checkWiseS == '1'">&nbsp; Shipping Bill No
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Shipping Bill No</span>
                                    </td>
                                    <td colspan="2">

                                        <textarea class="form-control width300" [(ngModel)]="shipbillno" [disabled]=shipdisable></textarea>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="col-form-span-heading" colspan="3">
                                        <input type="radio" name="radiogroupS" (click)="mainchkSearch('2')" [checked]="checkWiseS == '2'">&nbsp; Export No
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Export No</span>
                                    </td>
                                    <td colspan="2">
                                        <input type="text" [(ngModel)]="exptno" maxlength="15" [disabled]=exptnodisable class="form-control width150">
                                    </td>
                                </tr>
                                <tr>
                                    <td class="col-form-span-heading" colspan="3">
                                        Subject And Date
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Subject</span>
                                    </td>
                                    <td colspan="2">

                                        <textarea class="form-control width300" [(ngModel)]="subject"></textarea>
                                    </td>
                                </tr>

                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Print Date</span>
                                    </td>
                                    <td colspan="2">
                                        <my-date-picker name="dtprint" [options]="myDatePickerOptions" [(ngModel)]="dtprint" required></my-date-picker>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <span class="col-form-span-label ">Display Format</span>
                                    </td>
                                    <td>
                                        <input type="radio" name="radiogroupF" (click)="mainCheckF('1')" [checked]="checkWiseF == '1'">&nbsp;
                                        <span class="col-form-span-label ">Table Format</span>
                                    </td>
                                    <td>
                                        <input type="radio" name="radiogroupF" (click)="mainCheckF('2')" [checked]="checkWiseF == '2'">&nbsp;
                                        <span class="col-form-span-label "> Statement Format</span>
                                    </td>
                                </tr>
                                <td colspan="3" class="centerlabel">
                                    <button class="btn btn-sm btn-success" type="Print" (click)="print()">
                                        <span class="col-form-span-label">
                                            <i class="fa fa-print"></i> Print
                                        </span>
                                    </button>
                                </td>
                            </tbody>
                        </table>
                    </div>

                </div>
                <div class="col-md-3"></div>
            </div>
        </div>
