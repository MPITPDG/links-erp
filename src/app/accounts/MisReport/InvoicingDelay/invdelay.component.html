<div class="animated fadeIn" >  
    <div class="row no-gutters"  >
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header formheading">
                    <div class="row no-gutters">
                        <div class="col-sm-12">
                            <strong>{{Header}}</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row no-gutters" >
        <div class="col-sm-12 col-md-3 col-lg-3">
        </div>
        <div class="col-sm-12 col-md-6 col-lg-6 ">
            <table class="table table-bordered table-sm-new bgwhite">
                <tr>
                    <td class="col-form-span-heading" colspan="6"> <b>{{PageType}}</b> </td>
           </tr>
           <tr class="trbg">
      
            <td colspan="2">
      <div class="leftlabel">
                    <span class="col-form-span-label">
                        <input type="radio" name="radioDisplay" value="SEAEXPORT" (change)="lblchange($event)" [(ngModel)]="rdbtype" />&nbsp;Sea Export </span>&nbsp;&nbsp;&nbsp;&nbsp;
           </div>
            </td>
            <td colspan="2">
                <div class="leftlabel">
                           <span class="col-form-span-label">
                        <input type="radio" name="radioDisplay" value="SEAIMPORT" (change)="lblchange($event)" [(ngModel)]="rdbtype" />&nbsp;Sea Import</span>
       </div>
            </td>
          
        </tr>
          <tr>
            <td colspan="2" >
                <div class="leftlabel">
                    <span class="col-form-span-label">
                     <input type="radio" name="radioDisplay" value="AIREXPORT" (change)="lblchange($event)" [(ngModel)]="rdbtype" />&nbsp;Air Export </span>&nbsp;&nbsp;&nbsp;&nbsp;
                  </div>
                      </td>
                      <td colspan="2" >
                        <div class="leftlabel">
                    <span class="col-form-span-label">
                   <input type="radio" name="radioDisplay" value="AIRIMPORT" (change)="lblchange($event)" [(ngModel)]="rdbtype"  />&nbsp;Air Import</span>
                         </div>
                  </td>         
          </tr> 
                <tr>
                    <td><span class="col-form-span-label"><b>{{frmdtlbl}}</b> </span><span
                        class="col-form-span-error">*</span></td>
                <td>
                    <my-date-picker name="FromDate" (dateChanged)="FromDateChanged($event)"  [options]="myDatePickerOptionsRpt"
                        class="form-control"  [selDate]="FromDate"    ></my-date-picker>
                </td>
                    <td><span class="col-form-span-label"><b>{{todtlbl}} </b> </span><span
                            class="col-form-span-error">*</span></td>
                    <td><my-date-picker name="ToDate" (dateChanged)="ToDateChanged($event)"  [options]="myDatePickerOptionsRpt"
                            class="form-control"  [selDate]="ToDate"   ></my-date-picker>
                    </td>
                </tr>
                <tr>
                    <td colspan="6" class="centerlabel">
                        <button class="btn btn-sm btn-primary" type="submit" (click)="ExportData()" > <span
                                class="col-form-span-label"><i class="fa fa-file-excel-o"></i>
                                Export To Excel </span></button>&nbsp;
                                <button class="btn btn-sm btn-danger" type="reset"> <span class="col-form-span-label" (click)="Reset();"><i class="fa fa-ban"></i> Reset</span></button>
                    </td>
                </tr>
            </table>
        </div>
        <div class="col-sm-12 col-md-3 col-lg-3">
        </div>
    </div>
</div>
