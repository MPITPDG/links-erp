  <!-- Upload Card -->
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        
        <div class="card-header">
          <div class="d-flex align-items-center">
            <i class="fa fa-cloud-upload me-2 text-primary"></i>
            <h6 class="mb-0 fw-semibold">Upload File</h6>
          </div>
        </div>

        <div class="card-body p-4">
          
          <!-- Drop Zone -->
          <div 
            class="drop-zone"
            [class.drag-over]="isDragOver"
            [class.has-file]="selectedFile"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            (click)="fileInput.click()">
            
            <div *ngIf="!selectedFile" class="drop-zone-content">
              <i class="fa fa-cloud-upload drop-icon"></i>
              <p class="drop-text">Drag & Drop file here</p>
              <p class="drop-subtext">or <span class="browse-link">browse</span> to choose file</p>
              <p class="allowed-types">Allowed: XLS, XLSX, CSV, PDF, DOC, DOCX</p>
            </div>

            <div *ngIf="selectedFile" class="file-preview">
              <i class="fa file-type-icon" [ngClass]="getFileIcon()"></i>
              <div class="file-info">
                <p class="file-name">{{ selectedFile.name }}</p>
                <p class="file-size">{{ getFileSize() }}</p>
              </div>
              <button 
                class="btn-remove" 
                (click)="removeFile($event)"
                title="Remove file">
                <i class="fa fa-times"></i>
              </button>
            </div>

          </div>

          <!-- Hidden File Input -->
          <input 
            #fileInput
            type="file" 
            class="d-none"
            (change)="onFileSelected($event)"
            accept=".xls,.xlsx,.csv,.pdf,.doc,.docx">

          <!-- Form Fields -->
          <div class="row g-3 mt-2">
            <!-- <div class="col-md-6">
              <label class="form-label">Document Type <span class="text-danger">*</span></label>

                placeholder="-- Select Type --"
                class="custom-ng-select">
              </ng-select>
            </div> -->
<!-- 
            <div class="col-md-6">

              <input

                placeholder="Enter reference no">
            </div>

            <div class="col-12">
              <label class="form-label">Remarks</label>
              <textarea 
                class="form-control form-control-sm"
                [(ngModel)]="remarks"
                rows="2"
                placeholder="Enter remarks (optional)">
              </textarea>
            </div> -->
          </div>

          <!-- Progress Bar -->
          <div *ngIf="isUploading" class="mt-3">
            <div class="d-flex justify-content-between mb-1">
              <small class="text-muted">Uploading...</small>
              <small class="text-muted">{{ uploadProgress }}%</small>
            </div>
            <div class="progress" style="height: 6px;">
              <div 
                class="progress-bar progress-bar-striped progress-bar-animated"
                [style.width.%]="uploadProgress">
              </div>
            </div>
          </div>

          <!-- Success Message -->
          <div *ngIf="uploadSuccess" class="alert alert-success mt-3 py-2">
            <i class="fa fa-check-circle me-2"></i>
            File uploaded successfully!
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="alert alert-danger mt-3 py-2">
            <i class="fa fa-exclamation-circle me-2"></i>
            {{ errorMessage }}
          </div>

          <!-- Action Buttons -->
          <div class="d-flex justify-content-center gap-2 mt-4">
             <button 
              class="btn btn-primary btn-sm px-4"
              (click)="uploadFile()"
              [disabled]="!selectedFile || isUploading ">
              <i class="fa fa-upload me-1"></i>
              {{ isUploading ? 'Uploading...' : 'Upload' }}
            </button>&nbsp;&nbsp;
            <button 
              class="btn btn-outline-secondary btn-sm px-4"
              (click)="reset()"
              [disabled]="isUploading">
              <i class="fa fa-refresh me-1"></i>Reset
            </button>
           
          </div>

        </div>
      </div>
    </div>
