<div class="animated fadeIn">
    <div class="row no-gutters">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header formheading">
                    <div class="row no-gutters">
                        <div class="col-sm-12">
                            <strong>{{PageName|uppercase}}</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row no-gutters">
        <div class="col-sm-12 col-md-3 col-lg-3">
        </div>
        <div class="col-sm-12 col-md-6 col-lg-6 ">
            <table class="table table-bordered table-sm-new bgwhite">

                <tr>
                    <td class="col-form-span-heading" colspan="4" style="text-align: left;" >
                        <b>Date Wise</b>
                    </td>
                </tr>   
                <tr>
                  
                    <td ><span class="col-form-span-label"><b>From</b> </span><span
                        class="col-form-span-error">*</span></td>
                <td  style="text-align: left;">              
                    <my-date-picker name="FromDate" [options]="myDatePickerOptions" [(ngModel)]="FromDate"  (dateChanged)="InvoiceDateChanged($event,'F')"  ></my-date-picker>
                </td>
                    <td><span class="col-form-span-label"><b>To </b> </span><span
                            class="col-form-span-error">*</span></td>
                    <td  style="text-align: left;">              
                        <my-date-picker name="ToDate" [options]="myDatePickerOptions"  [(ngModel)]="ToDate"  (dateChanged)="InvoiceDateChanged($event,'T')"></my-date-picker>
                    </td>
                </tr>
        

                <tr>
                    <td colspan="6" class="centerlabel">
                        <button class="btn btn-sm btn-primary" type="submit" (click)="expt_exl_details()" *ngIf="PageType=='Invoice'"> <span
                                class="col-form-span-label"><i class="fa fa-file-excel-o"></i>
                                Export To Excel Details</span></button>&nbsp;
                                <button class="btn btn-sm btn-primary" type="submit" (click)="expt_exl()"> <span
                                    class="col-form-span-label"><i class="fa fa-file-excel-o"></i>
                                    Export To Excel </span></button>&nbsp;
                        <button class="btn btn-sm btn-danger" type="reset"> <span class="col-form-span-label"
                                (click)="clear();"><i class="fa fa-ban"></i>Clear</span></button>
                    </td>
                </tr>
            </table>
        </div>
        <div class="col-sm-12 col-md-3 col-lg-3">
        </div>
    </div>
   
</div>
